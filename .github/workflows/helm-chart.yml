name: Helm Chart

on:
  push:
    branches: [main]
    paths:
      - 'deploy/charts/**'
      - '.github/workflows/helm-chart.yml'
  pull_request:
    branches: [main]
    paths:
      - 'deploy/charts/**'
      - '.github/workflows/helm-chart.yml'
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Update dependencies
        run: helm dependency update deploy/charts/aura-llm-gateway

      - name: Lint chart
        run: helm lint deploy/charts/aura-llm-gateway

      - name: Template render (default values)
        run: helm template aura deploy/charts/aura-llm-gateway --dependency-update

      - name: Template render (with subcharts and ingress)
        run: |
          helm template aura deploy/charts/aura-llm-gateway \
            --dependency-update \
            --set postgresql.enabled=true \
            --set redis.enabled=true \
            --set ingress.enabled=true \
            --set autoscaling.enabled=true \
            --set secrets.inline.auraMasterKey=test \
            --set secrets.inline.openaiApiKey=sk-test

  publish:
    name: Publish to GHCR (OCI)
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      # Bump Chart.yaml `version` AND `appVersion` to match the GitHub
      # release tag. Without this every push lands on `:0.1.0` (the
      # committed value) and overwrites the previous chart, leaving
      # users with no way to pin to a specific gateway version. See
      # ghcr.io/umaitech/charts/aura-llm-gateway — every prior chart
      # before this fix has an empty tag list.
      - name: Sync chart version to release tag
        run: |
          set -euo pipefail
          # github.event.release.tag_name is like "v0.11.0"; helm wants
          # the bare semver without the v prefix in Chart.yaml.
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "Setting Chart.yaml version=${VERSION} appVersion=${VERSION}"
          # In-place edit. The `version:` and `appVersion:` keys are
          # always at top-level of Chart.yaml so a simple sed is safe.
          sed -i -E "s/^version: .*$/version: ${VERSION}/" deploy/charts/aura-llm-gateway/Chart.yaml
          sed -i -E "s/^appVersion: .*$/appVersion: \"${VERSION}\"/" deploy/charts/aura-llm-gateway/Chart.yaml
          # Echo the result so the change is visible in run logs.
          grep -E '^(version|appVersion):' deploy/charts/aura-llm-gateway/Chart.yaml

      - name: Build dependencies
        run: |
          helm dependency update deploy/charts/aura-llm-gateway
          # helm 3.16 helm package requires subcharts as extracted directories,
          # but helm dependency update leaves them as .tgz files. Unpack them.
          # shopt -s nullglob makes the glob expand to nothing (not literal)
          # if no .tgz files matched — keeps the loop safe to re-run.
          cd deploy/charts/aura-llm-gateway/charts && \
            shopt -s nullglob && \
            for f in *.tgz; do tar -xzf "$f" && rm "$f"; done

      - name: Package chart
        run: helm package deploy/charts/aura-llm-gateway --destination ./packaged

      - name: Push chart to GHCR
        run: |
          CHART_TGZ=$(ls ./packaged/aura-llm-gateway-*.tgz | head -n1)
          # OCI registries require lowercase repository references
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          helm push "$CHART_TGZ" "oci://ghcr.io/${OWNER}/charts"
