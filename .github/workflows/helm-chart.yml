name: Helm Chart

on:
  push:
    branches: [main]
    paths:
      - 'deploy/charts/**'
      - '.github/workflows/helm-chart.yml'
  pull_request:
    branches: [main]
    paths:
      - 'deploy/charts/**'
      - '.github/workflows/helm-chart.yml'
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Lint chart
        run: helm lint deploy/charts/aura-llm-gateway

      - name: Update dependencies
        run: helm dependency update deploy/charts/aura-llm-gateway

      - name: Template render (default values)
        run: helm template aura deploy/charts/aura-llm-gateway

      - name: Template render (with subcharts and ingress)
        run: |
          helm template aura deploy/charts/aura-llm-gateway \
            --set postgresql.enabled=true \
            --set redis.enabled=true \
            --set ingress.enabled=true \
            --set autoscaling.enabled=true \
            --set secrets.inline.auraMasterKey=test \
            --set secrets.inline.openaiApiKey=sk-test

  publish:
    name: Publish to GHCR (OCI)
    runs-on: ubuntu-latest
    needs: [lint]
    if: github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Update dependencies
        run: helm dependency update deploy/charts/aura-llm-gateway

      - name: Package chart
        run: helm package deploy/charts/aura-llm-gateway --destination ./packaged

      - name: Push chart to GHCR
        run: |
          CHART_TGZ=$(ls ./packaged/aura-llm-gateway-*.tgz | head -n1)
          helm push "$CHART_TGZ" oci://ghcr.io/${{ github.repository_owner }}/charts
