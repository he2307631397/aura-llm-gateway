<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Match the logo color scheme -->
    <linearGradient id="faviconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>

    <radialGradient id="faviconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="faviconRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>

    <filter id="faviconGlowFilter">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="12" fill="url(#faviconBg)"/>

  <!-- Subtle glow -->
  <circle cx="32" cy="32" r="28" fill="url(#faviconGlow)"/>

  <!-- Gateway core circles -->
  <g filter="url(#faviconGlowFilter)">
    <circle cx="32" cy="32" r="18" fill="none" stroke="url(#faviconRing)" stroke-width="1.5" opacity="0.4"/>
    <circle cx="32" cy="32" r="14" fill="none" stroke="url(#faviconRing)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Central "A" with glow -->
  <g filter="url(#faviconGlowFilter)">
    <path d="M 24 42 L 32 22 L 40 42 L 36.5 42 L 35 37.5 L 29 37.5 L 27.5 42 Z M 30 34 L 34 34 L 32 27 Z"
          fill="#FFFFFF"/>
  </g>
</svg>
