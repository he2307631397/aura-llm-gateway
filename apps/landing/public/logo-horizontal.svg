<svg width="550" height="200" viewBox="0 0 550 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients using the approved color scheme -->
    <radialGradient id="hCoreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.6" />
      <stop offset="40%" style="stop-color:#818CF8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="hPrimaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="hDeepGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="hTextGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="hStrongGlow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="hSoftGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="hTextGlow">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon on the left (scaled down and centered vertically) -->
  <g transform="translate(100, 100)">
    <!-- Outer aura glow -->
    <circle cx="0" cy="0" r="85" fill="url(#hCoreGlow)" opacity="0.8"/>

    <!-- Gateway core - concentric circles -->
    <g filter="url(#hSoftGlow)">
      <circle cx="0" cy="0" r="40" fill="none" stroke="url(#hPrimaryGradient)" stroke-width="1.2" opacity="0.4"/>
      <circle cx="0" cy="0" r="30" fill="none" stroke="url(#hPrimaryGradient)" stroke-width="1.5" opacity="0.6"/>
      <circle cx="0" cy="0" r="20" fill="url(#hDeepGradient)" opacity="0.3"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="url(#hPrimaryGradient)" stroke-width="2"/>
    </g>

    <!-- Central "A" lettermark -->
    <g filter="url(#hStrongGlow)">
      <path d="M -12 12 L 0 -18 L 12 12 L 7.5 12 L 5.5 6 L -5.5 6 L -7.5 12 Z M -3.5 1 L 3.5 1 L 0 -10 Z"
            fill="#FFFFFF"
            opacity="0.95"/>
    </g>

    <!-- Subtle energy field lines -->
    <g opacity="0.15">
      <circle cx="0" cy="0" r="48" fill="none" stroke="url(#hPrimaryGradient)" stroke-width="0.4"/>
      <circle cx="0" cy="0" r="56" fill="none" stroke="url(#hPrimaryGradient)" stroke-width="0.4"/>
      <circle cx="0" cy="0" r="64" fill="none" stroke="url(#hPrimaryGradient)" stroke-width="0.4"/>
    </g>
  </g>

  <!-- Text on the right (moved closer with monospace font) -->
  <g transform="translate(195, 100)">
    <g filter="url(#hTextGlow)">
      <text x="0" y="12"
            font-family="'Courier New', 'Monaco', 'Menlo', 'Consolas', monospace"
            font-size="35"
            font-weight="700"
            fill="url(#hTextGradient)"
            letter-spacing="1">LLM GATEWAY</text>
    </g>
  </g>
</svg>
