<svg width="512" height="560" viewBox="0 0 512 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients using the approved color scheme -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:0.6" />
      <stop offset="40%" style="stop-color:#818CF8;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="deepGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filters -->
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer aura glow -->
  <circle cx="256" cy="230" r="220" fill="url(#coreGlow)" opacity="0.8"/>

  <!-- Gateway core - concentric circles representing layers -->
  <g filter="url(#softGlow)">
    <!-- Outer ring -->
    <circle cx="256" cy="230" r="100" fill="none" stroke="url(#primaryGradient)" stroke-width="3" opacity="0.4"/>

    <!-- Middle ring -->
    <circle cx="256" cy="230" r="75" fill="none" stroke="url(#primaryGradient)" stroke-width="4" opacity="0.6"/>

    <!-- Inner core -->
    <circle cx="256" cy="230" r="50" fill="url(#deepGradient)" opacity="0.3"/>
    <circle cx="256" cy="230" r="50" fill="none" stroke="url(#primaryGradient)" stroke-width="5"/>
  </g>

  <!-- Central "A" lettermark with strong glow -->
  <g filter="url(#strongGlow)">
    <path d="M 226 260 L 256 180 L 286 260 L 274 260 L 269 245 L 243 245 L 238 260 Z M 248 232 L 264 232 L 256 204 Z"
          fill="#FFFFFF"
          opacity="0.95"/>
  </g>

  <!-- Subtle energy field lines radiating from center -->
  <g opacity="0.15">
    <circle cx="256" cy="230" r="120" fill="none" stroke="url(#primaryGradient)" stroke-width="1"/>
    <circle cx="256" cy="230" r="140" fill="none" stroke="url(#primaryGradient)" stroke-width="1"/>
    <circle cx="256" cy="230" r="160" fill="none" stroke="url(#primaryGradient)" stroke-width="1"/>
  </g>

  <!-- Text: LLM GATEWAY with monospace font -->
  <g filter="url(#textGlow)">
    <text x="256" y="400"
          font-family="'Courier New', 'Monaco', 'Menlo', 'Consolas', monospace"
          font-size="32"
          font-weight="700"
          text-anchor="middle"
          fill="url(#textGradient)"
          letter-spacing="2">LLM GATEWAY</text>
  </g>
</svg>
