<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818CF8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background with gradient -->
  <rect width="64" height="64" rx="12" fill="url(#bgGradient)"/>

  <!-- Subtle hexagon outline -->
  <path d="M 32 12 L 46 20.5 L 46 37.5 L 32 46 L 18 37.5 L 18 20.5 Z"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="1.5"
        opacity="0.2"/>

  <!-- Central "A" with glow -->
  <g filter="url(#iconGlow)">
    <path d="M 24 46 L 32 22 L 40 46 L 36 46 L 34.5 41 L 29.5 41 L 28 46 Z M 30.5 37 L 33.5 37 L 32 29 Z"
          fill="#FFFFFF"/>
  </g>

  <!-- Flow indicators (minimal) -->
  <circle cx="14" cy="32" r="2" fill="#A78BFA" opacity="0.7"/>
  <circle cx="50" cy="32" r="2" fill="#FFFFFF" opacity="0.8"/>
  <path d="M 16 32 L 18 32" stroke="#A78BFA" stroke-width="1.5" opacity="0.6"/>
  <path d="M 46 32 L 48 32" stroke="#FFFFFF" stroke-width="1.5" opacity="0.7"/>
</svg>
