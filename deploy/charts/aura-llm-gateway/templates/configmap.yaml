apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "aura-llm-gateway.fullname" . }}
  labels:
    {{- include "aura-llm-gateway.labels" . | nindent 4 }}
data:
  AURA_HOST: {{ .Values.config.host | quote }}
  AURA_PORT: {{ .Values.config.port | quote }}
  RUST_LOG: {{ .Values.config.logLevel | quote }}
  {{- if .Values.config.yaml }}
  config.yaml: |
{{ .Values.config.yaml | indent 4 }}
  {{- end }}
