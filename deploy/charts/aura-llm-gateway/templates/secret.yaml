{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aura-llm-gateway.fullname" . }}
  labels:
    {{- include "aura-llm-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- with .Values.secrets.inline.auraMasterKey }}
  AURA_MASTER_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.auraAdminKey }}
  AURA_ADMIN_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.databaseUrl }}
  DATABASE_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.redisUrl }}
  REDIS_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.openaiApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.googleApiKey }}
  GOOGLE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.mistralApiKey }}
  MISTRAL_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.huggingfaceApiKey }}
  HUGGINGFACE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.huggingfaceEndpointUrl }}
  HUGGINGFACE_ENDPOINT_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.huggingfaceModel }}
  HUGGINGFACE_MODEL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.ollamaBaseUrl }}
  OLLAMA_BASE_URL: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.awsRegion }}
  AWS_REGION: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.inline.awsSecretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ . | quote }}
  {{- end }}
{{- end }}
