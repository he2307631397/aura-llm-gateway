# fly.toml app configuration file generated for aura-gateway on 2026-05-18T09:56:26+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aura-gateway'
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  # Fly prepends the Dockerfile ENTRYPOINT, so we just pass the subcommand args.
  release_command = 'migrate'

[env]
  AURA_CORS_ALLOWED_ORIGINS = 'https://playground.aura-llm.dev,https://aura-llm.dev'
  AURA_HOST = '0.0.0.0'
  AURA_PORT = '8080'
  RUST_LOG = 'info,aura_proxy=info,aura_core=info'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
