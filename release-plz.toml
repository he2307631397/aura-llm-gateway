# release-plz configuration
# https://release-plz.ieni.dev/docs/config

[workspace]
# Git tag format for releases
git_tag_name = "v{{ version }}"
# Enable creating git tags (required for triggering build workflow)
git_tag_enable = true
# Enable GitHub releases
git_release_enable = true
# Changelog update strategy
changelog_update = true
# Changelog configuration (git-cliff)
changelog_config = "cliff.toml"
# Point every crate at the single workspace-level changelog instead of
# generating one per crate. Per-crate CHANGELOGs in a workspace see every
# commit (git-cliff can't tell which crate a commit belongs to without
# `include_paths`) and end up duplicating the entire repo history under
# every version. One source of truth is cleaner.
changelog_path = "CHANGELOG.md"
# Release name for workspace releases
git_release_name = "Aura LLM Gateway v{{ version }}"

# Allow dirty worktree for release commits
allow_dirty = false

# Semver check disabled (not publishing to crates.io)
semver_check = false

# PR settings
pr_labels = ["release"]
pr_draft = false

# Version bumping: feat commits always bump minor (even in 0.x)
features_always_increment_minor = true

# Individual package configuration
# publish = false prevents publishing to crates.io
# All packages contribute to workspace version bumps
# Only aura-proxy creates the actual GitHub release
[[package]]
name = "aura-types"
publish = false
release = true
git_release_enable = false
git_tag_enable = false

[[package]]
name = "aura-db"
publish = false
release = true
git_release_enable = false
git_tag_enable = false

[[package]]
name = "aura-core"
publish = false
release = true
git_release_enable = false
git_tag_enable = false

[[package]]
name = "aura-proxy"
publish = false
release = true
# Only this package creates the GitHub release and tag
git_release_enable = true
git_tag_enable = true
# Aggregate commits from every other workspace crate into aura-proxy's
# changelog. Without this, release-plz applies a per-crate include_paths
# filter (commits attributed to the crate iff they touch its files), so
# a commit that fixes aura-core only shows up under aura-core's changelog
# — and since all four crates point at the same CHANGELOG.md via
# changelog_path, aura-proxy (the one that creates the GitHub release)
# gets only its own commits and the others end up missing.
#
# NOTE: this fixes attribution between Rust crates. Commits touching ONLY
# apps/admin/, apps/landing/, .github/, etc., still won't be attributed
# to any crate and will be dropped from the auto-generated changelog.
# When a release PR's CHANGELOG looks short, edit it by hand to add the
# frontend / CI commits before merging — that's the rule documented in
# CLAUDE.md under "Updating the Public Roadmap".
changelog_include = ["aura-types", "aura-db", "aura-core"]
